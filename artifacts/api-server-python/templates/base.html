<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Pulse{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: "#111827",
            card: "#1f2937",
            border: "#374151",
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    body { background-color: #0d1117; color: #e2e8f0; }
    .htmx-indicator { opacity: 0; transition: opacity 200ms; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }
    .bar-fill { transition: width 600ms ease-out; }
  </style>
</head>
<body class="min-h-screen antialiased">

  <!-- Navbar -->
  <header class="sticky top-0 z-50 border-b border-gray-800 bg-gray-900/90 backdrop-blur-sm">
    <div class="mx-auto max-w-6xl px-4 flex items-center justify-between h-14">
      <a href="/" class="flex items-center gap-2.5 group">
        <div class="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center text-white font-black text-sm">P</div>
        <span class="font-bold text-white text-lg tracking-tight">Pulse</span>
      </a>
      <nav class="hidden sm:flex items-center gap-6 text-sm text-gray-400">
        <a href="/" class="hover:text-white transition-colors">Explore</a>
      </nav>
      <a href="/create"
         class="bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors">
        Create Poll
      </a>
    </div>
  </header>

  <!-- Page content -->
  <main class="mx-auto max-w-6xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-16 border-t border-gray-800 py-8 text-center text-sm text-gray-600">
    Pulse &mdash; Vote on anything
  </footer>

</body>
</html>
